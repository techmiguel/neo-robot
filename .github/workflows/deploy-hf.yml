name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]
    paths:
      - "servidor/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # git subtree necesita el historial completo

      - name: Push servidor/ to HF Space
        run: |
          git remote add hf https://techmigue:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/techmigue/neo-servidor
          git push hf $(git subtree split --prefix servidor main):main --force
