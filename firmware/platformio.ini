; Configuración PlatformIO — NEO Robot Asistente
; Placa: Le-ESP32-S3-Lipo de Ledo Electronics (módulo ESP32-S3-WROOM)
; Framework: Arduino

[env:esp32dev]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

; Velocidad de monitor serial (para depuración)
monitor_speed = 115200

; Librerías del proyecto (se descargan automáticamente)
lib_deps =
    ; OLED SSD1306 — Adafruit SSD1306 + GFX (U8g2 tiene incompatibilidad con ESP32-S3 Arduino core 3.x)
    adafruit/Adafruit SSD1306 @ ^2.5.13
    adafruit/Adafruit GFX Library @ ^1.11.11
    ; Cliente WebSocket para comunicación con el servidor Python
    gilmaimon/ArduinoWebsockets @ ^0.5.3

; Opciones de compilación: habilitar C++17 y warnings útiles
build_flags =
    -std=gnu++17
    -Wall
    -Wextra
    -DCORE_DEBUG_LEVEL=3

; Tamaño de partición: usar esquema con más espacio para app y SPIFFS
board_build.partitions = min_spiffs.csv

; Directorio de pruebas
test_build_src = yes
