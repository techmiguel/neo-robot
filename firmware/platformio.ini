; Configuración PlatformIO — NEO Robot Asistente
; Placa: Le-ESP32-S3-Lipo de Ledo Electronics (módulo ESP32-S3-WROOM)
; Framework: Arduino

[common]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
lib_deps =
    adafruit/Adafruit SSD1306 @ ^2.5.13
    adafruit/Adafruit GFX Library @ ^1.11.11
    gilmaimon/ArduinoWebsockets @ ^0.5.3
build_flags =
    -std=gnu++17
    -Wall
    -Wextra
    -DCORE_DEBUG_LEVEL=3
board_build.partitions = min_spiffs.csv
test_build_src = yes

; ------------------------------------------------------------
; Firmware principal
; ------------------------------------------------------------
[env:esp32dev]
extends = common
; Excluye la carpeta demos/ para que no haya conflicto de main()
build_src_filter = +<*> -<demos/>

; ------------------------------------------------------------
; Demo: ojos reactivos al volumen
; Para flashear: pio run -e demo_ojos --target upload
; ------------------------------------------------------------
[env:demo_ojos]
extends = common
build_src_filter = +<display/> +<audio/> +<demos/ojos/>

; ------------------------------------------------------------
; Demo: reproducción de voz humana por el altavoz
; Prerequisito: ejecutar tools/gen_frase.py antes de compilar
; Para flashear: pio run -e demo_bocina --target upload
; ------------------------------------------------------------
[env:demo_bocina]
extends = common
build_src_filter = +<display/> +<audio/> +<demos/bocina/>
